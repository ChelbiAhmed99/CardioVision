services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://express-backend:3000
      - VITE_FLASK_TARGET=http://flask-ai:8080
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - express-backend

  express-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    command: npm run server
    environment:
      - NODE_ENV=development
      - PORT=3000
      - FLASK_API_URL=http://flask-ai:8080
      - JWT_SECRET=test001234
      - CLIENT_URL=http://localhost:5173
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - flask-ai

  flask-ai:
    build:
      context: .
      dockerfile: Dockerfile.flask
    ports:
      - "8080:8080"
    command: python app.py
    environment:
      - FLASK_ENV=development
      - EF_MODEL_PATH=models/r2plus1d_18_32_2_pretrained.pt
      - SEG_MODEL_PATH=models/deeplabv3_resnet50_random.pt
      - SKIP_MODEL_DOWNLOAD=true
    volumes:
      - ./backend:/app
      - ./backend/input:/app/input
      - ./backend/output:/app/output
      - ./backend/models:/app/models
