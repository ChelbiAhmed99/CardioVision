version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FLASK_API_URL=http://ai:8080
    depends_on:
      - ai

  ai:
    build:
      context: ./backend
      dockerfile: Dockerfile.ai
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - DATA_PATH=./input
      - OUTPUT_PATH=./output
    volumes:
      - ./backend/models:/app/models
