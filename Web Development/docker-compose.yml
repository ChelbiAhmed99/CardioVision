services:
  express-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
      - VITE_API_URL=${VITE_API_URL:-/api}
      - FLASK_API_URL=${FLASK_API_URL:-http://flask-ai:5000}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./cardiovision.sqlite:/app/cardiovision.sqlite
    depends_on:
      - flask-ai

  flask-ai:
    build:
      context: .
      dockerfile: Dockerfile.flask
    ports:
      - "5000:5000"
    volumes:
      - ./backend/input:/app/input
      - ./backend/output:/app/output
      - ./backend/models:/app/models
